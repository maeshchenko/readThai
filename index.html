<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>Читай по-тайски за 10 дней</title>
    <meta name="description" content="Книжный курс тайского письма: 10 уроков, 85 нативных аудио, тренировка голоса." />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon-180.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/apple-touch-icon-152.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/icons/apple-touch-icon-120.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <link rel="apple-touch-startup-image" href="/splash/iphone-se-light.png" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (prefers-color-scheme: light)" />
    <link rel="apple-touch-startup-image" href="/splash/iphone-se-dark.png" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (prefers-color-scheme: dark)" />
    <link rel="apple-touch-startup-image" href="/splash/iphone-x-light.png" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3) and (prefers-color-scheme: light)" />
    <link rel="apple-touch-startup-image" href="/splash/iphone-x-dark.png" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3) and (prefers-color-scheme: dark)" />
    <link rel="apple-touch-startup-image" href="/splash/iphone-13-light.png" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (prefers-color-scheme: light)" />
    <link rel="apple-touch-startup-image" href="/splash/iphone-13-dark.png" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (prefers-color-scheme: dark)" />
    <link rel="apple-touch-startup-image" href="/splash/iphone-15-pro-max-light.png" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (prefers-color-scheme: light)" />
    <link rel="apple-touch-startup-image" href="/splash/iphone-15-pro-max-dark.png" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (prefers-color-scheme: dark)" />

    <meta name="theme-color" content="#f3ece0" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1a1612" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Read Thai" />
    <meta name="format-detection" content="telephone=no" />

    <script>
      (function () {
        try {
          var saved = localStorage.getItem('theme');
          var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var isDark = saved === 'dark' || (!saved && prefersDark);
          document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
        } catch (_) {}
      })();
    </script>

    <style>
      html, body { background-color: #f3ece0; }
      html[data-theme="dark"], html[data-theme="dark"] body { background-color: #1a1612; }
      #root:empty::before {
        content: '';
        position: fixed;
        inset: 0;
        background: inherit;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
