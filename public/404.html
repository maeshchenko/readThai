<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Read Thai</title>
    <script>
      (function () {
        var BASE = '/readThai';
        var l = window.location;
        var path = l.pathname;
        if (path.indexOf(BASE) === 0) path = path.slice(BASE.length);
        var redirect = BASE + '/?p=' + encodeURIComponent(path) + (l.search ? '&q=' + encodeURIComponent(l.search.slice(1)) : '') + l.hash;
        l.replace(redirect);
      })();
    </script>
  </head>
  <body></body>
</html>
