<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Read Thai</title>
    <meta name="robots" content="noindex, follow" />
    <script>
      (function () {
        var l = window.location;
        var path = l.pathname;
        var redirect = '/?p=' + encodeURIComponent(path) + (l.search ? '&q=' + encodeURIComponent(l.search.slice(1)) : '') + l.hash;
        l.replace(redirect);
      })();
    </script>
  </head>
  <body></body>
</html>
